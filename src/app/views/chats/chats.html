<div class="layout">
  <div class="sidebar">
    <div class="header">
      <h2>Chats</h2>

      <a routerLink="/nuevo" class="new-chat-button"> + Nuevo chat </a>
    </div>

    <app-chat-list></app-chat-list>
  </div>

  <div class="chat-area">
    <router-outlet #outlet="outlet"></router-outlet>

    @if (!outlet.isActivated) {
      <div class="placeholder">Selecciona un chat para comenzar</div>
    }
  </div>
</div>
